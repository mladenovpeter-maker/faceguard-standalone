        employeeId:
          type: integer
        employeeName:
          type: string
        employeeNumber:
          type: string
        employeePhotoUrl:
          type: ["string", "null"]
        departmentName:
          type: string
        position:
          type: string
        daysPresent:
          type: integer
        daysAbsent:
          type: integer
        daysOnLeave:
          type: integer
        totalMinutes:
          type: integer
        avgFirstSeen:
          type: ["string", "null"]
        avgLastSeen:
          type: ["string", "null"]
        firstSeen:
          type: ["string", "null"]
          format: date-time
        lastSeen:
          type: ["string", "null"]
          format: date-time
        zoneName:
          type: ["string", "null"]
        leaveType:
          type: ["string", "null"]
        leaveReason:
          type: ["string", "null"]

    AttendanceReport:
      type: object
      required: [from, to, totalEmployees, workingDays, rows]
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        totalEmployees:
          type: integer
        workingDays:
          type: integer
        rows:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceReportRow"

    AttendanceRecord:
