        employeeName:
          type: ["string", "null"]
        employeeNumber:
          type: ["string", "null"]
        employeePhotoUrl:
          type: ["string", "null"]
        departmentName:
          type: ["string", "null"]
        type:
          type: string
          enum: [paid_leave, unpaid_leave, sick_leave, other]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        reason:
          type: ["string", "null"]
        status:
          type: string
          enum: [approved, pending, rejected]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    LeaveInput:
      type: object
      required: [employeeId, type, startDate, endDate]
      properties:
