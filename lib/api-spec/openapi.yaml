      properties:
        employeeId:
          type: integer
        employeeName:
          type: string
        employeeNumber:
          type: string
        employeePhotoUrl:
          type: ["string", "null"]
        departmentName:
          type: string
        position:
          type: string
        leaveId:
          type: ["integer", "null"]
        leaveType:
          type: ["string", "null"]
