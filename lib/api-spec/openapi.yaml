        zoneName:
          type: ["string", "null"]
        dayOfWeek:
          type: integer
          description: 1=Monday, 2=Tuesday, ... 7=Sunday (ISO)
          minimum: 1
          maximum: 7
        startTime:
          type: string
          description: "HH:MM"
        endTime:
          type: string
          description: "HH:MM"
        breaks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleBreak"

    ZoneWorkScheduleInput:
      type: object
      required: [zoneId, dayOfWeek, startTime, endTime]
      properties:
        zoneId:
          type: integer
        dayOfWeek:
          type: integer
          minimum: 1
          maximum: 7
        startTime:
          type: string
        endTime:
          type: string
        breaks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleBreak"

