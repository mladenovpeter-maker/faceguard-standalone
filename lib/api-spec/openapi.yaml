openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FaceGuard - Face Recognition Access & Attendance System
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: employees
    description: Employee management
  - name: cameras
    description: Camera management
  - name: zones
    description: Zone/room access management
  - name: recognitions
    description: Face recognition events
  - name: attendance
    description: Attendance records
  - name: access-rules
    description: Access control rules
  - name: dashboard
    description: Dashboard summaries
  - name: leaves
    description: Employee leave management
  - name: zone-schedules
    description: Zone work schedule management
  - name: departments
    description: Department management
  - name: department-schedules
    description: Per-department work schedule management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # EMPLOYEES
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, all]
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Register a new employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /employees/{id}/photo:
    post:
      operationId: uploadEmployeePhoto
      tags: [employees]
      summary: Upload employee face photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUpload"
      responses:
        "200":
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}/photos:
    get:
      operationId: listEmployeePhotos
      tags: [employees]
      summary: List all enrolled photos for an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of enrolled photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeePhoto"
    post:
      operationId: addEmployeePhoto
      tags: [employees]
      summary: Add an enrollment photo for an employee (max 5). Computes an internal AI face descriptor used as a fallback when the camera itself cannot recognize the person.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUpload"
      responses:
        "201":
          description: Photo added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeePhoto"

  /employees/{id}/photos/{photoId}:
    delete:
      operationId: deleteEmployeePhoto
      tags: [employees]
      summary: Remove an enrolled photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: photoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # CAMERAS
  /cameras:
    get:
      operationId: listCameras
      tags: [cameras]
      summary: List all cameras
      responses:
        "200":
          description: List of cameras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Camera"
    post:
      operationId: createCamera
      tags: [cameras]
      summary: Add a new camera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CameraInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camera"

  /cameras/{id}:
    get:
      operationId: getCamera
      tags: [cameras]
      summary: Get camera by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Camera
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camera"
    patch:
      operationId: updateCamera
      tags: [cameras]
      summary: Update camera
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CameraUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camera"
    delete:
      operationId: deleteCamera
      tags: [cameras]
      summary: Delete camera
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cameras/{id}/test:
    post:
      operationId: testCameraConnection
      tags: [cameras]
      summary: Test camera RTSP/HTTP connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraTestResult"

  # ZONES
  /zones:
    get:
      operationId: listZones
      tags: [zones]
      summary: List all zones/rooms
      responses:
        "200":
          description: List of zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"
    post:
      operationId: createZone
      tags: [zones]
      summary: Create a zone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZoneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"

  /zones/{id}:
    patch:
      operationId: updateZone
      tags: [zones]
      summary: Update zone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZoneUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
    delete:
      operationId: deleteZone
      tags: [zones]
      summary: Delete zone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ACCESS RULES
  /access-rules:
    get:
      operationId: listAccessRules
      tags: [access-rules]
      summary: List access rules
      responses:
        "200":
          description: Access rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessRule"
    post:
      operationId: createAccessRule
      tags: [access-rules]
      summary: Create access rule (employee <-> zone permission)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRule"

  /access-rules/{id}:
    delete:
      operationId: deleteAccessRule
      tags: [access-rules]
      summary: Remove access rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # RECOGNITION EVENTS
  /recognitions:
    get:
      operationId: listRecognitions
      tags: [recognitions]
      summary: List recognition events
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: cameraId
          in: query
          schema:
            type: ["integer", "null"]
        - name: zoneId
          in: query
          schema:
            type: ["integer", "null"]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: string
            enum: [recognized, unknown, denied, all]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Recognition events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecognitionEvent"
    post:
      operationId: createRecognition
      tags: [recognitions]
      summary: Log a recognition event (called by camera integration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecognitionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecognitionEvent"

  # ATTENDANCE
  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: zoneId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance summary
      responses:
        "200":
          description: Today's attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayAttendance"

  /attendance/report:
    get:
      operationId: getAttendanceReport
      tags: [attendance]
      summary: Attendance report for a date range
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Attendance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceReport"

  # LEAVES
  /leaves:
    get:
      operationId: listLeaves
      tags: [leaves]
      summary: List employee leaves
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
            enum: [approved, pending, rejected, all]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: activeOn
          in: query
          description: Filter leaves active on this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Leaves list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRecord"
    post:
      operationId: createLeave
      tags: [leaves]
      summary: Create a leave record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRecord"

  /leaves/{id}:
    get:
      operationId: getLeave
      tags: [leaves]
      summary: Get a single leave record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leave record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRecord"
        "404":
          description: Not found
    patch:
      operationId: updateLeave
      tags: [leaves]
      summary: Update a leave record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRecord"
        "404":
          description: Not found
    delete:
      operationId: deleteLeave
      tags: [leaves]
      summary: Delete a leave record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ZONE WORK SCHEDULES
  /zone-schedules:
    get:
      operationId: listZoneSchedules
      tags: [zone-schedules]
      summary: List zone work schedules
      parameters:
        - name: zoneId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Zone schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneWorkSchedule"
    post:
      operationId: upsertZoneSchedule
      tags: [zone-schedules]
      summary: Create or update a zone work schedule slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZoneWorkScheduleInput"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneWorkSchedule"

  /zone-schedules/{id}:
    delete:
      operationId: deleteZoneSchedule
      tags: [zone-schedules]
      summary: Delete a zone work schedule slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # DEPARTMENTS
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "404":
          description: Not found
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "409":
          description: Department has assigned employees

  # DEPARTMENT WORK SCHEDULES
  /department-schedules:
    get:
      operationId: listDepartmentSchedules
      tags: [department-schedules]
      summary: List department work schedules
      parameters:
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Department schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentWorkSchedule"
    post:
      operationId: upsertDepartmentSchedule
      tags: [department-schedules]
      summary: Create or update a department work schedule slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentWorkScheduleInput"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentWorkSchedule"

  /department-schedules/{id}:
    delete:
      operationId: deleteDepartmentSchedule
      tags: [department-schedules]
      summary: Delete a department work schedule slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-events:
    get:
      operationId: getRecentEvents
      tags: [dashboard]
      summary: Get recent recognition events (last 20)
      responses:
        "200":
          description: Recent events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecognitionEvent"

  /dashboard/hourly-activity:
    get:
      operationId: getHourlyActivity
      tags: [dashboard]
      summary: Get hourly recognition activity for today
      responses:
        "200":
          description: Hourly activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlyActivity"

  /dashboard/presence:
    get:
      operationId: getDashboardPresence
      tags: [dashboard]
      summary: Get today's presence status for all active employees
      responses:
        "200":
          description: Employee presence list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeePresence"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status, db, uptimeSeconds]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        db:
          type: string
          enum: [ok, error]
        uptimeSeconds:
          type: number

    Employee:
      type: object
      required: [id, firstName, lastName, employeeNumber, departmentId, departmentName, position, status, createdAt]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        employeeNumber:
          type: string
        departmentId:
          type: integer
        departmentName:
          type: string
        position:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]
        hiredAt:
          type: ["string", "null"]
          format: date
        createdAt:
          type: string
          format: date-time

    EmployeeInput:
      type: object
      required: [firstName, lastName, employeeNumber, departmentId, position]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        employeeNumber:
          type: string
          minLength: 1
        departmentId:
          type: integer
        position:
          type: string
        email:
          type: string
        phone:
          type: string
        hiredAt:
          type: string
          format: date

    EmployeeUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        departmentId:
          type: integer
        position:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]
        hiredAt:
          type: ["string", "null"]
          format: date

    Department:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        employeeCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    DepartmentInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    ScheduleBreak:
      type: object
      required: [name, startTime, endTime]
      properties:
        name:
          type: string
          description: "e.g. Обедна почивка"
        startTime:
          type: string
          description: "HH:MM"
        endTime:
          type: string
          description: "HH:MM"

    DepartmentWorkSchedule:
      type: object
      required: [id, departmentId, dayOfWeek, startTime, endTime, breaks]
      properties:
        id:
          type: integer
        departmentId:
          type: integer
        departmentName:
          type: ["string", "null"]
        dayOfWeek:
          type: integer
          description: 1=Monday, 2=Tuesday, ... 7=Sunday (ISO)
          minimum: 1
          maximum: 7
        startTime:
          type: string
          description: "HH:MM"
        endTime:
          type: string
          description: "HH:MM"
        breaks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleBreak"

    DepartmentWorkScheduleInput:
      type: object
      required: [departmentId, dayOfWeek, startTime, endTime]
      properties:
        departmentId:
          type: integer
        dayOfWeek:
          type: integer
          minimum: 1
          maximum: 7
        startTime:
          type: string
        endTime:
          type: string
        breaks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleBreak"

    PhotoUpload:
      type: object
      required: [photoBase64]
      properties:
        photoBase64:
          type: string
          description: Base64 encoded image

    EmployeePhoto:
      type: object
      required: [id, employeeId, photoUrl, hasFaceDescriptor, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        photoUrl:
          type: string
        hasFaceDescriptor:
          type: boolean
          description: Whether a face was detected and an internal AI descriptor stored for this photo
        createdAt:
          type: string
          format: date-time

    Camera:
      type: object
      required: [id, name, brand, protocol, host, zoneId, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
          enum: [dahua, hikvision, unv, other]
        protocol:
          type: string
          enum: [rtsp, http, https]
        host:
          type: string
        port:
          type: ["integer", "null"]
        username:
          type: ["string", "null"]
        streamPath:
          type: ["string", "null"]
        zoneId:
          type: integer
        zoneName:
          type: ["string", "null"]
        status:
          type: string
          enum: [online, offline, unknown]
        createdAt:
          type: string
          format: date-time

    CameraInput:
      type: object
      required: [name, brand, protocol, host, zoneId]
      properties:
        name:
          type: string
          minLength: 1
        brand:
          type: string
          enum: [dahua, hikvision, unv, other]
        protocol:
          type: string
          enum: [rtsp, http, https]
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        password:
          type: string
        streamPath:
          type: string
        zoneId:
          type: integer

    CameraUpdate:
      type: object
      properties:
        name:
          type: string
        brand:
          type: string
          enum: [dahua, hikvision, unv, other]
        protocol:
          type: string
          enum: [rtsp, http, https]
        host:
          type: string
        port:
          type: ["integer", "null"]
        username:
          type: ["string", "null"]
        password:
          type: ["string", "null"]
        streamPath:
          type: ["string", "null"]
        zoneId:
          type: integer
        status:
          type: string
          enum: [online, offline, unknown]

    CameraTestResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        latencyMs:
          type: ["integer", "null"]
        snapshotBase64:
          type: ["string", "null"]
          description: Base64-encoded JPEG snapshot from the camera (data:image/jpeg;base64,...)

    Zone:
      type: object
      required: [id, name, accessLevel, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        accessLevel:
          type: string
          enum: [public, restricted, secure]
        cameraCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ZoneInput:
      type: object
      required: [name, accessLevel]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        accessLevel:
          type: string
          enum: [public, restricted, secure]

    ZoneUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        accessLevel:
          type: string
          enum: [public, restricted, secure]

    AccessRule:
      type: object
      required: [id, employeeId, zoneId, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: ["string", "null"]
        employeeNumber:
          type: ["string", "null"]
        zoneId:
          type: integer
        zoneName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AccessRuleInput:
      type: object
      required: [employeeId, zoneId]
      properties:
        employeeId:
          type: integer
        zoneId:
          type: integer

    RecognitionEvent:
      type: object
      required: [id, cameraId, status, confidence, detectedAt]
      properties:
        id:
          type: integer
        cameraId:
          type: integer
        cameraName:
          type: ["string", "null"]
        zoneId:
          type: ["integer", "null"]
        zoneName:
          type: ["string", "null"]
        employeeId:
          type: ["integer", "null"]
        employeeName:
          type: ["string", "null"]
        employeeNumber:
          type: ["string", "null"]
        employeePhotoUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [recognized, unknown, denied]
        confidence:
          type: number
          description: Confidence score 0-1
        snapshotUrl:
          type: ["string", "null"]
        detectedAt:
          type: string
          format: date-time

    RecognitionInput:
      type: object
      required: [cameraId, status, confidence, detectedAt]
      properties:
        cameraId:
          type: integer
        employeeId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [recognized, unknown, denied]
        confidence:
          type: number
        snapshotUrl:
          type: ["string", "null"]
        snapshotBase64:
          type: ["string", "null"]
          description: >
            Base64 snapshot of the detected face, provided by the camera/NVR when status is
            "unknown" so the system's internal AI can attempt a fallback match against
            enrolled employee photos. Ignored when status is "recognized" or "denied".
        detectedAt:
          type: string
          format: date-time

    AttendanceReportRow:
      type: object
      required: [employeeId, employeeName, employeeNumber, departmentName, position, daysPresent, daysAbsent, daysOnLeave, totalMinutes]
