          format: date
        firstSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
        zoneId:
          type: ["integer", "null"]
        zoneName:
          type: ["string", "null"]
        totalMinutes:
          type: ["integer", "null"]

    TodayAttendance:
      type: object
