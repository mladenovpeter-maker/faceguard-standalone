server {
    listen 80;
    server_name _;

    # Static frontend (Vite build output)
    root /usr/share/nginx/html;
    index index.html;

    # Serve recognition snapshot images directly from api-server.
    # Binary JPEG files need buffering disabled so nginx streams them through
    # instead of trying to fit them into small default proxy buffers.
    location /api/snapshots/ {
        proxy_pass http://api-server:8080/api/snapshots/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # Proxy API calls to the api-server container. This mirrors the Replit
    # shared proxy, which routes /api to the API server and / to the web app.
    location /api/ {
        proxy_pass http://api-server:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 15m;
    }

    # index.html — never cache (SPA entry point changes on every deploy)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # Vite assets have content-hash in filename — cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any non-file, non-/api route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
