server {
    listen 80;
    server_name _;

    # Static frontend (Vite build output)
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the api-server container. This mirrors the Replit
    # shared proxy, which routes /api to the API server and / to the web app.
    location /api/ {
        proxy_pass http://api-server:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 15m;
    }

    # SPA fallback: any non-file, non-/api route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
